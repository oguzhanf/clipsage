---
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # Required to create releases and upload assets
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version from Directory.Build.props
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content "Directory.Build.props"
          $versionLine = $content | `
            Where-Object { $_ -match '<Version>(.*)</Version>' }
          $version = ($versionLine -replace `
            '<Version>(.*)</Version>', '$1').Trim()
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Restore dependencies
        run: dotnet restore ClipSage.sln

      - name: Build solution
        run: dotnet build ClipSage.sln -c Release --no-restore

      - name: Publish application
        run: |
          dotnet publish ClipSage.App\ClipSage.App.csproj `
            -c Release -r win-x64 --self-contained false `
            -o bin\ClipSage-${{ steps.get_version.outputs.VERSION }}

      - name: Create release executable
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $publishDir = "bin\ClipSage-$version"
          $exePath = "bin\ClipSage-$version.exe"

          # Find the main executable
          $mainExePath = Join-Path $publishDir "ClipSage.App.exe"
          if (Test-Path $mainExePath) {
            Copy-Item -Path $mainExePath -Destination $exePath -Force
            Write-Host "Created release executable: $exePath"
          } else {
            Write-Host "ERROR: Could not find ClipSage.App.exe"
            exit 1
          }

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $publishDir = "bin\ClipSage-$version"
          $zipPath = "bin\ClipSage-$version.zip"

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory(
            $publishDir, $zipPath)
          Write-Host "Created ZIP archive: $zipPath"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClipSage-${{ steps.get_version.outputs.VERSION }}
          path: |
            bin/ClipSage-${{ steps.get_version.outputs.VERSION }}.exe
            bin/ClipSage-${{ steps.get_version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        if: >
          (github.event_name == 'push' &&
           startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: >
            ${{ github.event_name == 'push' && github.ref_name ||
                format('v{0}', steps.get_version.outputs.VERSION) }}
          name: ClipSage v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ClipSage v${{ steps.get_version.outputs.VERSION }} Release

            ### What's New
            - Latest stable release of ClipSage
            - Bug fixes and improvements

            ### Installation
            1. Download the `ClipSage-${{ steps.get_version.outputs.VERSION }}.exe` file
            2. Run the executable
            3. Enjoy ClipSage!

            ### Files
            - **ClipSage-${{ steps.get_version.outputs.VERSION }}.exe**: Single-file portable executable (recommended)
            - **ClipSage-${{ steps.get_version.outputs.VERSION }}.zip**: ZIP archive with all files
          files: |
            bin/ClipSage-${{ steps.get_version.outputs.VERSION }}.exe
            bin/ClipSage-${{ steps.get_version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
